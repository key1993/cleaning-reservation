<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EBSHER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F6F4EF;
            --surface: #FFFFFF;
            --border: #EBE7DE;
            --border-2: #E0DBD0;
            --text: #2C2A25;
            --text-2: #6B665C;
            --text-3: #9C978B;
            --accent: #2D6BDA;
            --accent-d: #1E54B8;
            --accent-soft: #E5EFFC;
            --rose-soft: #FAE4DF;
            --rose-ink: #9F3422;
            --teal: #0E9C8A;
            --blue: #2D6BDA;
            --shadow-sm: 0 1px 2px rgba(50,42,20,.04), 0 1px 3px rgba(50,42,20,.05);
            --shadow-lg: 0 18px 50px rgba(40,34,18,.14), 0 4px 14px rgba(40,34,18,.07);
            --r: 12px;
            --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle grid pattern on background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: .45;
            pointer-events: none;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 44px 40px 40px;
            width: 100%;
            max-width: 400px;
            animation: rise .3s cubic-bezier(.32,.72,0,1);
        }
        @keyframes rise { from { opacity: 0; transform: translateY(16px); } }

        /* Brand */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .brand-mark {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(150deg, var(--teal) 0%, var(--blue) 100%);
            display: grid; place-items: center;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .brand-mark img { width: 100%; height: 100%; object-fit: contain; }
        .brand-name { font-size: 22px; font-weight: 800; letter-spacing: .03em; color: var(--text); }
        .brand-sub { font-size: 13px; color: var(--text-3); font-weight: 600; margin-top: -6px; }

        /* Divider */
        .divider { height: 1px; background: var(--border); margin-bottom: 28px; }

        /* Form */
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 12px; font-weight: 700;
            color: var(--text-2);
            margin-bottom: 6px;
            letter-spacing: .01em;
        }
        .input-wrap { position: relative; }
        .field input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border-2);
            border-radius: var(--r);
            font-size: 14px;
            font-family: var(--sans);
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .field input::placeholder { color: var(--text-3); }
        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .field input.has-toggle { padding-right: 42px; }

        .toggle-btn {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer; color: var(--text-3);
            font-size: 17px; line-height: 1;
            padding: 2px; transition: color .12s;
        }
        .toggle-btn:hover { color: var(--text); }

        /* Error */
        .error-box {
            display: none;
            align-items: center;
            gap: 8px;
            background: var(--rose-soft);
            color: var(--rose-ink);
            padding: 11px 14px;
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 18px;
        }
        .error-box.show { display: flex; }

        /* Submit */
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: 14.5px;
            font-weight: 700;
            font-family: var(--sans);
            cursor: pointer;
            margin-top: 6px;
            transition: background .15s, box-shadow .15s;
            box-shadow: 0 2px 8px rgba(45,107,218,.25);
        }
        .submit-btn:hover { background: var(--accent-d); box-shadow: 0 4px 14px rgba(45,107,218,.3); }
        .submit-btn:active { transform: scale(.99); }

        /* Footer note */
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: var(--text-3);
            margin-top: 22px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-mark">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="EBSHER">
            </div>
            <div class="brand-name">EBSHER</div>
            <div class="brand-sub">Admin Panel</div>
        </div>

        <div class="divider"></div>

        <div id="errorMessage" class="error-box">
            ⚠️ <span id="errorText"></span>
        </div>

        <form method="POST" id="loginForm">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required class="has-toggle">
                    <button type="button" class="toggle-btn" onclick="togglePassword()" title="Show / hide password">👁️</button>
                </div>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <div class="footer-note">EBSHER Solar Cleaning — Admin Access Only</div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const btn = document.querySelector('.toggle-btn');
            if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
            else { input.type = 'password'; btn.textContent = '👁️'; }
        }

        {% if error %}
        document.getElementById('errorText').textContent = '{{ error }}';
        document.getElementById('errorMessage').classList.add('show');
        {% endif %}

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                e.preventDefault();
                document.getElementById('errorText').textContent = 'Please enter both username and password';
                document.getElementById('errorMessage').classList.add('show');
            }
        });
    </script>
</body>
</html>
